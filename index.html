<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GX-FILES ULTRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        
        /* গ্রেডিয়েন্ট এবং মোটা বাটন */
        .gradient-btn { 
            background: linear-gradient(135deg, #3b82f6 0%, #9333ea 100%); 
            color: white;
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
        }
        .active-tab { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%) !important; 
            color: white !important; 
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }
        
        .tab-btn { background: rgba(255,255,255,0.05); color: #777; transition: 0.3s; }
        ::-webkit-scrollbar { width: 3px; } 
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .progress-bar { transition: width 0.3s ease; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="mb-10 text-center">
            <h1 class="text-5xl font-black tracking-tighter uppercase italic">GX-FILES <span class="text-blue-500">ULTRA</span></h1> 
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-[0.4em] mt-2 opacity-80">20-Batch Parallel Transmission</p> 
        </div> 

        <div class="flex justify-center bg-white/5 p-1.5 rounded-2xl border border-white/10 mb-10 max-w-[320px] mx-auto"> 
            <button onclick="setType('photo')" id="tab-photo" class="tab-btn active-tab px-8 py-3.5 rounded-xl text-[11px] font-black transition-all flex-1">PHOTO</button> 
            <button onclick="setType('file')" id="tab-file" class="tab-btn px-8 py-3.5 rounded-xl text-[11px] font-black transition-all flex-1">FILES</button> 
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8"> 
            <div class="lg:col-span-1"> 
                <label class="glass h-72 flex flex-col items-center justify-center cursor-pointer border-2 border-dashed border-white/10 hover:border-blue-500/50 transition-all mb-6 group relative overflow-hidden"> 
                    <input type="file" id="fileInput" multiple class="hidden"> 
                    <span id="upload-icon" class="text-7xl mb-4 group-hover:scale-110 transition-transform">🖼️</span> 
                    <p id="upload-label" class="text-[11px] text-gray-400 font-black tracking-[0.2em] uppercase">Select Media</p> 
                </label> 

                <button onclick="ignite()" id="sendBtn" class="w-full py-5 gradient-btn font-black rounded-[22px] hover:brightness-110 transition-all active:scale-95 uppercase tracking-[0.2em] text-sm">Ignite Transfer</button> 
                
                <div id="status-box" class="mt-6 hidden p-6 glass border-blue-500/20">
                    <div class="flex justify-between items-center mb-3">
                        <p id="status-text" class="text-[10px] font-black text-blue-400 uppercase">Standby</p>
                        <p id="percent-text" class="text-[10px] font-black text-blue-400">0%</p>
                    </div>
                    <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                        <div id="progress-fill" class="progress-bar bg-blue-500 h-full w-0 shadow-[0_0_15px_#3b82f6]"></div>
                    </div>
                </div>
            </div> 

            <div class="lg:col-span-2 glass p-8 min-h-[500px] flex flex-col"> 
                <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-6"> 
                    <div>
                        <span class="text-[10px] font-black text-gray-500 tracking-widest uppercase block mb-1">Queue</span>
                        <span id="q-count" class="text-blue-500 font-black text-5xl">0</span> 
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] font-black text-gray-500 tracking-widest uppercase block mb-1">Success</span>
                        <span id="s-count" class="text-green-500 font-black text-5xl">0</span> 
                    </div>
                </div> 

                <div id="preview-area" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4 overflow-y-auto max-h-[450px] pr-2">
                    </div>
            </div> 
        </div>
    </div>

<script> 
const TOKEN = "7803047176:AAENBpYrmbNuFiBsAMf8fwFybVOsSNTgQM4"; 
const CHAT_ID = "5923885908"; 
const MAX_FILE_SIZE = 50 * 1024 * 1024; 
const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

let queue = []; 
let currentType = 'photo'; 

function setType(type) { 
    currentType = type; 
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab')); 
    document.getElementById(`tab-${type}`).classList.add('active-tab'); 
    document.getElementById('upload-icon').innerText = type === 'photo' ? '🖼️' : '📂'; 
    document.getElementById('upload-label').innerText = type === 'photo' ? 'Open Gallery' : 'Open Files';
    document.getElementById('fileInput').accept = type === 'photo' ? "image/*" : "*/*"; 
} 

document.getElementById('fileInput').onchange = (e) => { 
    const files = Array.from(e.target.files);
    files.forEach(file => {
        if(file.size <= MAX_FILE_SIZE) {
            if(file.type.startsWith('image/')) {
                file.preview = URL.createObjectURL(file);
            }
            queue.push(file);
        }
    });
    render(); 
    e.target.value = ""; 
}; 

function render() {
    const area = document.getElementById('preview-area');
    document.getElementById('q-count').innerText = queue.length;
    area.innerHTML = queue.map((f, i) => `
        <div class="relative aspect-square glass p-1.5 rounded-2xl border border-white/5 overflow-hidden group">
            ${f.preview ? 
                `<img src="${f.preview}" class="preview-img">` : 
                `<div class="h-full flex flex-col items-center justify-center text-[9px] text-gray-500 font-bold p-2 text-center bg-white/5 rounded-xl">📂<br>${f.name.substring(0,8)}</div>`
            }
            <button onclick="remove(${i})" class="absolute top-1 right-1 bg-red-600 hover:bg-red-500 text-white w-6 h-6 rounded-full text-[10px] flex items-center justify-center shadow-lg opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
        </div>
    `).join('');
}

function remove(i) { 
    if(queue[i].preview) URL.revokeObjectURL(queue[i].preview);
    queue.splice(i, 1); 
    render(); 
} 

async function sendFile(file) {
    const method = (currentType === 'photo' && file.size < 10*1024*1024) ? 'sendPhoto' : 'sendDocument';
    const field = method === 'sendPhoto' ? 'photo' : 'document';
    const fd = new FormData(); 
    fd.append("chat_id", CHAT_ID); 
    fd.append(field, file); 
    
    try {
        const response = await fetch(`https://api.telegram.org/bot${TOKEN}/${method}`, { method: 'POST', body: fd });
        return response.ok;
    } catch (err) { return false; }
}

async function ignite() { 
    if(!queue.length) return; 
    const btn = document.getElementById('sendBtn'); 
    const statusBox = document.getElementById('status-box');
    const progressFill = document.getElementById('progress-fill');
    const statusText = document.getElementById('status-text');
    const percentText = document.getElementById('percent-text');

    btn.disabled = true; 
    btn.classList.add('opacity-40');
    btn.innerText = "🚀 TRANSMITTING BATCHES..."; 
    statusBox.classList.remove('hidden');

    let sent = 0; 
    const total = queue.length; 
    const batchSize = 20; // ২০টি করে প্রসেসিং হবে

    for (let i = 0; i < queue.length; i += batchSize) {
        const batch = queue.slice(i, i + batchSize);
        statusText.innerText = `Transmitting Batch: ${Math.ceil((i+1)/batchSize)}`;
        
        await Promise.all(batch.map(async (file) => {
            const success = await sendFile(file);
            if(success) {
                sent++;
                document.getElementById('s-count').innerText = sent;
                document.getElementById('q-count').innerText = total - sent;
                const percent = Math.round((sent / total) * 100);
                progressFill.style.width = percent + "%";
                percentText.innerText = percent + "%";
            }
        }));

        if (i + batchSize < queue.length) {
            statusText.innerText = "Stabilizing (0.5s)...";
            await sleep(500); // ২০টি ফাইল পর ০.৫ সেকেন্ড বিরাম
        }
    }

    btn.innerText = "SUCCESSFULLY SENT"; 
    btn.style.background = "#10b981";
    statusText.innerText = "MISSION ACCOMPLISHED";
    setTimeout(() => { location.reload(); }, 3000); 
} 

setType('photo');
</script>
</body>
</html>
