<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GX-FILES ULTRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        
        .gradient-btn { 
            background: linear-gradient(135deg, #3b82f6 0%, #9333ea 100%); 
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .active-tab { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%) !important; 
            color: white !important; 
        }
        
        .tab-btn { background: rgba(255,255,255,0.05); color: #777; transition: 0.3s; }
        ::-webkit-scrollbar { width: 3px; } 
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-5xl mx-auto">
        <div class="mb-6 mt-2 text-center">
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight uppercase italic text-gray-200">GX-FILES <span class="text-blue-500">ULTRA</span></h1> 
            <p class="text-[8px] text-blue-400/60 font-bold uppercase tracking-[0.3em] mt-1">Safe Batch Transmission</p> 
        </div> 

        <div class="flex justify-center bg-white/5 p-1 rounded-xl border border-white/5 mb-8 max-w-[280px] mx-auto"> 
            <button onclick="setType('photo')" id="tab-photo" class="tab-btn active-tab px-6 py-2.5 rounded-lg text-[10px] font-black transition-all flex-1">PHOTO</button> 
            <button onclick="setType('file')" id="tab-file" class="tab-btn px-6 py-2.5 rounded-lg text-[10px] font-black transition-all flex-1">FILES</button> 
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6"> 
            <div class="lg:col-span-1"> 
                <label class="glass h-60 flex flex-col items-center justify-center cursor-pointer border-2 border-dashed border-white/10 hover:border-blue-500/40 transition-all mb-4 group overflow-hidden"> 
                    <input type="file" id="fileInput" multiple class="hidden"> 
                    <span id="upload-icon" class="text-5xl mb-3 group-hover:scale-110 transition-transform">🖼️</span> 
                    <p id="upload-label" class="text-[10px] text-gray-500 font-black tracking-widest uppercase">Open Media</p> 
                </label> 

                <button onclick="ignite()" id="sendBtn" class="w-full py-4 gradient-btn font-black rounded-xl hover:brightness-110 transition-all active:scale-95 uppercase tracking-widest text-xs">Ignite Transfer</button> 
                
                <div id="status-box" class="mt-4 hidden p-4 glass border-blue-500/10">
                    <div class="flex justify-between items-center mb-2">
                        <p id="status-text" class="text-[9px] font-black text-blue-400 uppercase">Ready</p>
                        <p id="percent-text" class="text-[9px] font-black text-blue-400">0%</p>
                    </div>
                    <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                        <div id="progress-fill" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div> 

            <div class="lg:col-span-2 glass p-6 min-h-[400px] flex flex-col"> 
                <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4"> 
                    <div>
                        <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Queue</span>
                        <span id="q-count" class="text-blue-500 font-black text-3xl block">0</span> 
                    </div>
                    <div class="text-right">
                        <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Sent</span>
                        <span id="s-count" class="text-green-500 font-black text-3xl block">0</span> 
                    </div>
                </div> 

                <div id="preview-area" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3 overflow-y-auto max-h-[350px] pr-1">
                    </div>
            </div> 
        </div>
    </div>

<script> 
const TOKEN = "7803047176:AAENBpYrmbNuFiBsAMf8fwFybVOsSNTgQM4"; 
const CHAT_ID = "5923885908"; 
const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

let queue = []; 
let currentType = 'photo'; 

function setType(type) { 
    currentType = type; 
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab')); 
    document.getElementById(`tab-${type}`).classList.add('active-tab'); 
    document.getElementById('upload-icon').innerText = type === 'photo' ? '🖼️' : '📂'; 
    document.getElementById('fileInput').accept = type === 'photo' ? "image/*" : "*/*"; 
} 

document.getElementById('fileInput').onchange = (e) => { 
    const files = Array.from(e.target.files);
    files.forEach(file => {
        if(file.type.startsWith('image/')) file.preview = URL.createObjectURL(file);
        queue.push(file);
    });
    render(); 
    e.target.value = ""; 
}; 

function render() {
    const area = document.getElementById('preview-area');
    document.getElementById('q-count').innerText = queue.length;
    area.innerHTML = queue.map((f, i) => `
        <div class="relative aspect-square glass p-1 rounded-xl border border-white/5 overflow-hidden group">
            ${f.preview ? `<img src="${f.preview}" class="preview-img">` : `<div class="h-full flex items-center justify-center text-[8px] text-gray-500 text-center p-1">📂<br>${f.name.substring(0,6)}</div>`}
            <button onclick="remove(${i})" class="absolute top-1 right-1 bg-red-600 text-white w-5 h-5 rounded-full text-[8px] flex items-center justify-center shadow-lg opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
        </div>
    `).join('');
}

function remove(i) { 
    if(queue[i].preview) URL.revokeObjectURL(queue[i].preview);
    queue.splice(i, 1); 
    render(); 
} 

async function sendFile(file) {
    const method = (currentType === 'photo' && file.size < 10*1024*1024) ? 'sendPhoto' : 'sendDocument';
    const field = method === 'sendPhoto' ? 'photo' : 'document';
    const fd = new FormData(); 
    fd.append("chat_id", CHAT_ID); 
    fd.append(field, file); 
    try {
        const response = await fetch(`https://api.telegram.org/bot${TOKEN}/${method}`, { method: 'POST', body: fd });
        return response.ok;
    } catch (err) { return false; }
}

async function ignite() { 
    if(!queue.length) return; 
    const btn = document.getElementById('sendBtn'); 
    const statusBox = document.getElementById('status-box');
    const progressFill = document.getElementById('progress-fill');
    const statusText = document.getElementById('status-text');
    const percentText = document.getElementById('percent-text');

    btn.disabled = true; 
    btn.classList.add('opacity-40');
    btn.innerText = "TRANSMITTING..."; 
    statusBox.classList.remove('hidden');

    let sent = 0; 
    const total = queue.length; 
    const batchSize = 20; 

    for (let i = 0; i < queue.length; i += batchSize) {
        const batch = queue.slice(i, i + batchSize);
        await Promise.all(batch.map(async (file) => {
            const success = await sendFile(file);
            if(success) {
                sent++;
                document.getElementById('s-count').innerText = sent;
                document.getElementById('q-count').innerText = total - sent;
                const percent = Math.round((sent / total) * 100);
                progressFill.style.width = percent + "%";
                percentText.innerText = percent + "%";
                statusText.innerText = `Sent: ${sent}/${total}`;
            }
        }));
        if (i + batchSize < queue.length) await sleep(500);
    }
    btn.innerText = "COMPLETED"; 
    btn.style.background = "#10b981";
    setTimeout(() => { location.reload(); }, 3000); 
} 
setType('photo');
</script>
</body>
</html>
