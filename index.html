<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Cloud Sync</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Hind Siliguri', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
}

/* Glass Card */
.card {
    width:340px;
    padding:35px;
    border-radius:30px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(25px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    text-align:center;
    animation: float 5s ease-in-out infinite;
}

@keyframes float {
    0%{transform:translateY(0)}
    50%{transform:translateY(-12px)}
    100%{transform:translateY(0)}
}

.icon {
    font-size:60px;
    margin-bottom:15px;
    filter: drop-shadow(0 10px 20px rgba(255,255,255,0.2));
}

h2 {
    color:#fff;
    margin:0;
}

p {
    color:#94a3b8;
    font-size:14px;
}

/* Button */
.btn {
    margin-top:20px;
    padding:15px;
    width:100%;
    border:none;
    border-radius:15px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    background: linear-gradient(135deg,#6366f1,#22c55e);
    color:#fff;
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.05);
}

/* Loader */
.loader {
    margin:15px auto;
    width:25px;
    height:25px;
    border:3px solid rgba(255,255,255,0.2);
    border-top:3px solid #fff;
    border-radius:50%;
    animation: spin 1s linear infinite;
    display:none;
}

@keyframes spin {
    100%{transform:rotate(360deg)}
}

.status {
    margin-top:10px;
    color:#22c55e;
}
</style>
</head>

<body>

<div class="card">
    <div class="icon">☁️</div>
    <h2>ক্লাউড সিঙ্ক</h2>
    <p>আপনার ডেটা নিরাপদভাবে সিঙ্ক করুন</p>

    <button class="btn" id="btn">Sync Start</button>

    <div class="loader" id="loader"></div>
    <div class="status" id="status">Ready</div>
</div>

<script>
const btn = document.getElementById("btn");
const loader = document.getElementById("loader");
const status = document.getElementById("status");

btn.onclick = () => {
    btn.disabled = true;
    loader.style.display = "block";
    status.innerText = "Connecting...";

    setTimeout(()=>{
        status.innerText = "Encrypting...";
    },1500);

    setTimeout(()=>{
        status.innerText = "Uploading...";
    },3000);

    setTimeout(()=>{
        loader.style.display = "none";
        status.innerText = "✅ সফল!";
        btn.disabled = false;
    },4500);
}
</script>

</body>
</html>
